meego:
  spaces:
    - space_id: "xxx"
      name: "开放平台前端"
    - space_id: "yyy"
      name: "开放平台基础"
  event_mode: "both"
  webhook:
    host: "0.0.0.0"
    port: 8080
    path: "/meego/webhook"
  poll:
    interval_seconds: 60
    lookback_minutes: 5
  long_connection:
    enabled: true
    reconnect_interval_seconds: 10
